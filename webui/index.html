<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Open Friday Web UI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="header">
      <h1>Open Friday Web UI</h1>
      <p>Interact with the local AI developer and generate apps, code, and more.</p>
    </div>
    <div class="panel" id="panel">
      <div id="log" class="log"></div>
      <div class="inputRow">
        <input id="prompt" placeholder="Describe what you want..."/>
        <button id="generateBtn">Generate</button>
      </div>
      <div class="actions">
        <button id="createApp">Create App</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
  </html>
